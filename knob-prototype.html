<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skeuomorphic Moog‑style Knobs</title>
<style>
:root { --panel:#cdbd83; --gold-1:#fff2c2; --gold-2:#f5cc7e; --gold-3:#d9a64d; --gold-4:#a6731f; }
html,body{height:100%;margin:0;display:flex;align-items:center;justify-content:center;background:var(--panel)}
.knob{ --size:160px; width:var(--size); height:var(--size); position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer; touch-action:none; }
.ticks{ position:absolute; inset:0; pointer-events:none; }
.ticks-svg{ width:100%; height:100%; display:block; }
.body{ width:80%; height:80%; border-radius:50%; position:relative;
  background: radial-gradient(100% 100% at 30% 25%, #2e2e2e, #141414 60%, #000 85%);
  box-shadow: inset 0 10px 15px rgba(255,255,255,0.1), inset 0 -12px 16px rgba(0,0,0,0.7), 0 12px 20px -8px rgba(0,0,0,0.8);
}
.body::after{ content:""; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:65%; height:65%; border-radius:50%;
  background: conic-gradient(from 45deg, var(--gold-4), var(--gold-1) 25%, var(--gold-4) 50%, var(--gold-1) 75%, var(--gold-4) 100%);
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.6), inset 0 -2px 3px rgba(0,0,0,0.4);
}
.indicator{ position:absolute; left:50%; top:50%; width:10px; height:10px; border-radius:50%; background:#fff; box-shadow:0 0 3px rgba(0,0,0,.7);
  /* Center the dot on the knob's center BEFORE rotating to avoid orbital drift */
  transform-origin:center center;
  /* initial angle doesn't matter; JS sets it each frame */
  transform: translate(-50%, -50%) rotate(220deg) translate(0, calc(var(--size)*-0.36));
}
</style>
</head>
<body>
  <div class="knob" data-value="0.5">
    <div class="ticks"><svg class="ticks-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="body"><div class="indicator"></div></div>
  </div>
<script>
const knob = document.querySelector('.knob');
const indicator = knob.querySelector('.indicator');
const svg = knob.querySelector('.ticks-svg');
let value = 0.5; // 0..1

// Mapping: 0% -> 310°, 100% -> 240° along long arc
const START_DEG = 300; // align 0% exactly to FIRST tick at 300°
const END_DEG   = 240; // align 100% exactly to last tick (240°)
const SWEEP_DEG = ((END_DEG - START_DEG + 360) % 360) || 360; // 300° sweep (300° → 240°)
const ANGLE_BIAS = 0; // no bias; endpoints now snap to tick centers precisely

function drawTicks(){
  svg.innerHTML = '';
  const cx=50, cy=50; const rOuter=48, rInner=38;
  for(let deg=0; deg<360; deg+=30){
    if(deg === 90) continue; // gap at bottom
    const rad = (deg) * Math.PI/180;
    const x1 = cx + Math.cos(rad)*rInner, y1 = cy + Math.sin(rad)*rInner;
    const x2 = cx + Math.cos(rad)*rOuter, y2 = cy + Math.sin(rad)*rOuter;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', 'rgba(0,0,0,0.9)');
    line.setAttribute('stroke-width', '2.4');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }
}

function update(){
  // snap ends to avoid floating-point drift and ensure exact tick alignment
  const v = value <= 0.0001 ? 0 : (value >= 0.9999 ? 1 : value);
  const userDeg = (START_DEG + SWEEP_DEG * v + ANGLE_BIAS + 360) % 360;
  const cssDeg  = userDeg - 90;
  indicator.style.transform = `translate(-50%, -50%) rotate(${cssDeg}deg) translate(0, calc(var(--size)*-0.36))`;
}

drawTicks();
update();

let dragging=false; let lastY=0;
knob.addEventListener('pointerdown', e=>{ dragging=true; lastY=e.clientY; knob.setPointerCapture(e.pointerId); e.preventDefault(); });
knob.addEventListener('pointerup', e=>{ dragging=false; knob.releasePointerCapture(e.pointerId); });
knob.addEventListener('pointercancel', ()=> dragging=false);
knob.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const dy = e.clientY - lastY; lastY = e.clientY;
  value = Math.min(1, Math.max(0, value - dy/200));
  update();
});
knob.addEventListener('wheel', e=>{ e.preventDefault(); value = Math.min(1, Math.max(0, value + (e.deltaY>0?-1:1)*0.02)); update(); }, {passive:false});
</script>
</body>
</html>
